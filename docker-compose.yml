name: engdb

# ==========================================================================
# Ambiente base do projeto — Issue #20
#   - postgres : banco de origem (dados transacionais)
#   - minio    : object storage que hospeda o Data Lake (arquitetura medalhão)
#   - createbuckets : container efêmero que cria o bucket inicial do Data Lake
#   - airflow       : orquestração (profile "airflow") — issue #30
#
# Subir base:     docker compose up -d
# Subir + Airflow: docker compose --profile airflow up -d --build
# Derrubar:       docker compose down            (mantém os dados nos volumes)
#                 docker compose down -v         (APAGA os dados dos volumes)
# ==========================================================================

services:
  postgres:
    image: postgres:16.14-alpine
    container_name: engdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - datalake

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: engdb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # API S3
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console web
    volumes:
      - minio_data:/data
    networks:
      - datalake

  # Container efêmero: espera o MinIO responder e cria o bucket do Data Lake.
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: engdb-createbuckets
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATALAKE_BUCKET: ${DATALAKE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do
        echo 'Aguardando MinIO...'; sleep 2;
      done;
      mc mb --ignore-existing local/\"$${DATALAKE_BUCKET}\";
      echo '==> Bucket pronto: '$${DATALAKE_BUCKET};
      mc ls local;
      "
    restart: "no"
    networks:
      - datalake

  # Orquestração (profile "airflow"). Reaproveita o postgres como metadata DB.
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: engdb-airflow:local
    container_name: engdb-airflow
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      # credenciais do admin (criadas no startup)
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      # acesso ao postgres (para criar o banco de metadados)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # MinIO para os notebooks
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATALAKE_BUCKET: ${DATALAKE_BUCKET}
      # Origem dos dados (Supabase) — usada pela camada Landing
      SOURCE_DB_HOST: ${SOURCE_DB_HOST:-}
      SOURCE_DB_PORT: ${SOURCE_DB_PORT:-5432}
      SOURCE_DB_NAME: ${SOURCE_DB_NAME:-postgres}
      SOURCE_DB_USER: ${SOURCE_DB_USER:-postgres}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD:-}
      SOURCE_DB_SCHEMA: ${SOURCE_DB_SCHEMA:-source}
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./notebooks:/opt/airflow/notebooks
      - airflow_logs:/opt/airflow/logs
    command:
      - bash
      - -c
      - |
        python /opt/airflow/ensure_metadata_db.py
        airflow db migrate
        airflow users create --username "$${AIRFLOW_ADMIN_USER}" --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true
        airflow scheduler &
        exec airflow webserver
    networks:
      - datalake

  # ====== Serving (profile "serving") — issue #46: Trino + Metabase sobre a Gold ======
  # Suba com:  docker compose --profile serving up -d
  # (Recomendado não rodar junto com o Airflow/Spark nesta máquina de 8GB.)

  # Hive Metastore (Derby embutido) — exigido pelo conector delta_lake do Trino.
  hive-metastore:
    image: apache/hive:4.0.1
    container_name: engdb-hive-metastore
    profiles: ["serving"]
    environment:
      SERVICE_NAME: metastore
      # Coloca o hadoop-aws + SDK (presentes na imagem) no classpath do Hive e
      # carrega o hive-site.xml com a config fs.s3a do MinIO, para o metastore
      # conseguir validar locations s3a:// ao registrar tabelas externas.
      HIVE_AUX_JARS_PATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar,/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    volumes:
      - ./docker/hive/conf:/hive_custom_conf:ro
    ports:
      - "9083:9083"
    mem_limit: 1g
    networks:
      - datalake

  # Trino — engine SQL que lê as tabelas Delta da Gold direto no MinIO.
  trino:
    image: trinodb/trino:455
    container_name: engdb-trino
    profiles: ["serving"]
    depends_on:
      - hive-metastore
      - minio
    environment:
      # usados via ${ENV:...} no catálogo delta.properties
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8090:8080"   # UI/API do Trino (a 8080 do host é do Airflow)
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog:ro
    mem_limit: 3g
    networks:
      - datalake

  # Metabase — dashboard analítico (One Page) consumindo a Gold via Trino.
  metabase:
    # Imagem própria = Metabase v0.50.32 + driver Starburst/Trino 5.0.0 baixado
    # no build (docker/metabase/Dockerfile). Reprodutível e persistente, sem
    # depender de um .jar binário versionado/montado no host.
    build:
      context: .
      dockerfile: docker/metabase/Dockerfile
    image: engdb-metabase:local
    container_name: engdb-metabase
    profiles: ["serving"]
    depends_on:
      - trino
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    mem_limit: 1500m
    networks:
      - datalake

volumes:
  postgres_data:
    name: engdb_postgres_data
  minio_data:
    name: engdb_minio_data
  airflow_logs:
    name: engdb_airflow_logs
  metabase_data:
    name: engdb_metabase_data

networks:
  datalake:
    name: engdb_datalake
    driver: bridge
