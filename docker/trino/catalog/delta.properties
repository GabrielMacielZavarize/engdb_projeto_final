# Catálogo Trino para a camada Gold (Delta Lake) no MinIO — issue #46.
# As credenciais são lidas das variáveis de ambiente do container (${ENV:...}).
connector.name=delta_lake
hive.metastore=thrift
hive.metastore.uri=thrift://hive-metastore:9083

# Acesso ao MinIO via file system S3 nativo do Trino.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}

# Permite registrar tabelas Delta já existentes (sem recriá-las).
delta.register-table-procedure.enabled=true
