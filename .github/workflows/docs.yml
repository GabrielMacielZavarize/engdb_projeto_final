name: Publicar Documentação (MkDocs)

# Publica o MkDocs no GitHub Pages automaticamente a cada push na main
# que altere a documentação. Requisito do trabalho (MkDocs gh-deploy).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar MkDocs Material
        run: pip install mkdocs-material

      - name: Build + deploy (gh-pages)
        run: mkdocs gh-deploy --force --no-history
